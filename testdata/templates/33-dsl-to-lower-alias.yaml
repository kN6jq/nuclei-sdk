id: test-33-dsl-to-lower-alias
info:
  name: DSL to_lower Alias Function Test
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/test/to-lower-alias"
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'to_lower(body) == "lowercase response body"'
