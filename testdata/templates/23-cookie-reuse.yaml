id: test-23-cookie-reuse
info:
  name: Cookie Reuse Test
  severity: info
http:
  - raw:
      - |
        GET /test/cookie-set HTTP/1.1
        Host: {{Hostname}}

      - |
        GET /test/cookie-check HTTP/1.1
        Host: {{Hostname}}

    cookie-reuse: true
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "cookie_received"
      - type: status
        status:
          - 200
