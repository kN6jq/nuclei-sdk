id: test-01-structured-get
info:
  name: Structured GET Test
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/test/structured"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Welcome to TestApp"
      - type: status
        status:
          - 200
