id: test-05-regex-matcher
info:
  name: Regex Matcher Test
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/test/regex-version"
    matchers-condition: and
    matchers:
      - type: regex
        regex:
          - "Version: \\d+\\.\\d+\\.\\d+"
      - type: status
        status:
          - 200
