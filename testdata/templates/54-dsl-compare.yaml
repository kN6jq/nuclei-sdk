id: test-54-dsl-compare
info:
  name: DSL Comparison Operators Test
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/test/dsl-compare"
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'status_code != 404'
      - type: dsl
        dsl:
          - 'len(body) >= 1'
      - type: dsl
        dsl:
          - 'len(body) <= 1000'
      - type: dsl
        dsl:
          - 'status_code > 100'
      - type: dsl
        dsl:
          - 'status_code < 500'
