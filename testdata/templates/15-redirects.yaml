id: test-15-redirects
info:
  name: Redirect Test
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/test/redirect"
    host-redirects: true
    max-redirects: 3
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Welcome to TestApp"
      - type: status
        status:
          - 200
