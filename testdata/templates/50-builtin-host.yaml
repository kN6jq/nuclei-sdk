id: test-50-builtin-host
info:
  name: Built-in Host Variable Test
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/test/builtin-host"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "host-is:"
      - type: status
        status:
          - 200
