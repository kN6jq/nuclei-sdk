id: test-47-dsl-regex-func
info:
  name: DSL regex() Function Test
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/test/dsl-regex-func"
    matchers-condition: and
    matchers:
      - type: dsl
        dsl:
          - 'regex("version", body)'
      - type: dsl
        dsl:
          - 'regex("build", body)'
