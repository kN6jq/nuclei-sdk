id: test-58-fp-nginx
info:
  name: Nginx Default Page Detection
  author: test
  severity: info
  description: Detects Nginx default installation page and version
  tags: fingerprint,nginx,server
  classification:
    cwe-id: CWE-200
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
    cvss-score: 0.0
http:
  - method: GET
    path:
      - "{{BaseURL}}/test/fp-nginx"
    matchers-condition: and
    matchers:
      - type: word
        part: title
        words:
          - "Welcome to nginx"
      - type: word
        part: header
        words:
          - "nginx"
      - type: status
        status:
          - 200
    extractors:
      - type: kval
        name: server_version
        part: header
        kval:
          - "Server"
