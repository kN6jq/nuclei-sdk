        words:
          - "step-a-pass"
        internal: true
  - method: GET
    path:
      - "{{BaseURL}}/test/flow-three-b"
    matchers:
      - type: word
        words:
          - "step-b-pass"
        internal: true
  - method: GET
    path:
      - "{{BaseURL}}/test/flow-three-c"
    matchers:
      - type: word
        words:
          - "step-c-pass"
