id: test-42-negative-status
info:
  name: Negative Status Matcher Test
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/test/neg-status"
    matchers-condition: and
    matchers:
      - type: status
        negative: true
        status:
          - 500
          - 404
      - type: word
        words:
          - "OK"
