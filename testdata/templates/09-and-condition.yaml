id: test-09-and-condition
info:
  name: Matchers AND Condition
  severity: info
http:
  - method: GET
    path:
      - "{{BaseURL}}/test/and-condition"
    matchers-condition: and
    matchers:
      - type: word
        words:
          - "and-test-pass"
      - type: word
        part: header
        words:
          - "X-And-Test"
      - type: status
        status:
          - 200
