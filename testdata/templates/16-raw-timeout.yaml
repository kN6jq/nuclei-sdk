id: test-16-raw-timeout
info:
  name: Raw Timeout Test
  severity: info
http:
  - raw:
      - |
        @timeout: 10s
        GET /test/slow HTTP/1.1
        Host: {{Hostname}}
    matchers:
      - type: dsl
        dsl:
          - 'duration >= 2'
          - 'status_code == 200'
        condition: and
